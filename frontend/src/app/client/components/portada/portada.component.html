<section class="p-4 md:p-6 lg:p-8 max-w-[1400px] mx-auto mt-2">
  <div class="grid grid-cols-1 md:grid-cols-4 md:grid-rows-2 gap-4 auto-rows-[300px] md:h-[600px]">
    
    <!-- Main Hero Card -->
    <div (click)="scrollToCatalog()" class="md:col-span-2 md:row-span-2 rounded-[2rem] overflow-hidden relative group cursor-pointer border border-neutral-200 dark:border-neutral-800/50 hover:border-amber-500/30 transition-colors">
      <div class="absolute inset-0 bg-gradient-to-t from-white via-white/30 dark:from-neutral-950 dark:via-neutral-950/40 to-transparent z-10 transition-colors duration-500"></div>
      <img 
        src="https://images.unsplash.com/photo-1522778119026-d647f0596c20?auto=format&fit=crop&q=80&w=1200&h=1000" 
        alt="Hero" 
        class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-[1.5s] ease-out"
      />
      <div class="absolute bottom-0 left-0 p-8 md:p-10 z-20 w-full flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
        <div>
          <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-amber-500/20 dark:bg-amber-500/10 text-amber-600 dark:text-amber-400 text-xs font-black uppercase tracking-widest backdrop-blur-md mb-4 border border-amber-500/30 dark:border-amber-500/20">
            <app-icono nombre="trophy" [size]="14"></app-icono>
            Lo último
          </div>
          <h1 class="text-4xl md:text-5xl lg:text-6xl font-black text-neutral-900 dark:text-white mb-2 md:mb-0 leading-[1.1] tracking-tight">
            Camisetas del<br/>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-500 to-orange-600 dark:from-amber-200 dark:via-amber-400 dark:to-amber-600">
              mundial de ahora
            </span>
          </h1>
        </div>
        
        <!-- Botón flotante abajo a la derecha -->
        <button class="flex items-center gap-2 bg-neutral-900 dark:bg-white text-white dark:text-neutral-950 px-6 py-3 md:px-8 md:py-4 rounded-full font-bold hover:bg-amber-500 dark:hover:bg-amber-400 hover:scale-105 transition-all active:scale-95 shadow-xl shadow-neutral-900/20 dark:shadow-none">
          Descubrir <app-icono nombre="arrow-right" [size]="18"></app-icono>
        </button>
      </div>
    </div>

    <!-- Secondary Card 1 -->
    <div (click)="scrollToCatalog()" class="md:col-span-1 md:row-span-1 rounded-[2rem] overflow-hidden relative group cursor-pointer border border-neutral-200 dark:border-neutral-800/50">
      <div class="absolute inset-0 bg-gradient-to-t from-white/90 dark:from-neutral-950/90 to-transparent z-10 transition-colors duration-500"></div>
      <img 
        src="https://images.unsplash.com/photo-1560272564-c83b66b1ad12?auto=format&fit=crop&q=80&w=600&h=600" 
        alt="Vintage" 
        class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000"
      />
      <div class="absolute bottom-0 left-0 p-6 z-20">
        <div class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-fuchsia-500/20 dark:bg-fuchsia-500/10 text-fuchsia-600 dark:text-fuchsia-400 text-[10px] font-black uppercase tracking-widest backdrop-blur-md mb-3 border border-fuchsia-500/30 dark:border-fuchsia-500/20">
          <app-icono nombre="crown" [size]="12"></app-icono> Clásicos
        </div>
        <h3 class="text-2xl font-bold text-neutral-900 dark:text-white leading-tight">Camisetas Retro</h3>
      </div>
    </div>

    <!-- Secondary Card 2 -->
    <div (click)="scrollToCatalog()" class="md:col-span-1 md:row-span-1 rounded-[2rem] overflow-hidden relative group cursor-pointer border border-neutral-200 dark:border-neutral-800 hover:border-cyan-500/50 flex flex-col justify-center items-center p-6 text-center transition-all duration-500">
        <img src="https://images.unsplash.com/photo-1551280857-2b9ebf241ac6?auto=format&fit=crop&q=80&w=600&h=600" class="absolute inset-0 w-full h-full object-cover opacity-20 dark:opacity-30 group-hover:scale-110 transition-transform duration-1000" />
        <div class="absolute inset-0 bg-gradient-to-t from-neutral-50 dark:from-neutral-950 to-transparent z-10 transition-colors duration-500"></div>
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-cyan-400/20 dark:from-cyan-900/40 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-700 z-10"></div>
        <app-icono nombre="zap" [size]="48" className="relative z-20 text-cyan-500 dark:text-cyan-400 mb-4 drop-shadow-[0_0_15px_rgba(6,182,212,0.3)] dark:drop-shadow-[0_0_15px_rgba(34,211,238,0.5)] group-hover:scale-110 group-hover:-rotate-12 transition-transform duration-500"></app-icono>
        <h3 class="text-lg md:text-xl font-bold text-neutral-900 dark:text-white mb-2 relative z-10 leading-tight">Ediciones limitadas de conjunto</h3>
        <p class="text-xs text-neutral-500 dark:text-neutral-400 font-bold relative z-10 uppercase tracking-widest">Camiseta + Pantalón</p>
    </div>

    <!-- Wide Card -->
    <div (click)="scrollToCatalog()" class="md:col-span-2 md:row-span-1 rounded-[2rem] overflow-hidden relative group cursor-pointer border border-neutral-200 dark:border-neutral-800/50">
        <div class="absolute inset-0 bg-gradient-to-r from-white/90 via-white/50 dark:from-neutral-950/90 dark:via-neutral-950/40 to-transparent z-10 transition-colors duration-500"></div>
      <img 
        src="https://images.unsplash.com/photo-1616124619460-ff4ed8f4683c?auto=format&fit=crop&q=80&w=1000&h=400" 
        alt="Visitante" 
        class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000"
      />
      <div class="absolute top-0 right-0 p-6 z-20">
          <div class="w-12 h-12 rounded-full bg-neutral-900/10 dark:bg-white/10 backdrop-blur-md flex items-center justify-center border border-neutral-900/20 dark:border-white/20 group-hover:bg-neutral-900 group-hover:text-white dark:group-hover:bg-white dark:group-hover:text-black transition-colors">
            <app-icono nombre="arrow-right" [size]="20" className="-rotate-45"></app-icono>
          </div>
      </div>
      <div class="absolute bottom-0 left-0 p-6 md:p-8 z-20 w-2/3">
        <div class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-rose-500/20 dark:bg-rose-500/10 text-rose-600 dark:text-rose-400 text-[10px] font-black uppercase tracking-widest backdrop-blur-md mb-3 border border-rose-500/30 dark:border-rose-500/20">
          <app-icono nombre="flame" [size]="12"></app-icono> Inglaterra
        </div>
        <h3 class="text-3xl md:text-4xl font-black text-neutral-900 dark:text-white">Premier League</h3>
      </div>
    </div>
  </div>
</section>
