<div 
  class="group relative h-full flex flex-col bg-white dark:bg-neutral-900/50 rounded-2xl md:rounded-[2rem] overflow-hidden border border-neutral-200 dark:border-neutral-800/50 hover:border-neutral-300 dark:border-neutral-700/80 hover:bg-white dark:bg-neutral-900 transition-all duration-500 hover:shadow-[0_0_30px_rgba(0,0,0,0.5)] transform-gpu will-change-transform"
  (mouseenter)="isHovered = true"
  (mouseleave)="isHovered = false"
>
  <div class="relative aspect-[4/5] overflow-hidden bg-neutral-50 dark:bg-neutral-950 p-1.5 md:p-2 cursor-pointer transform-gpu" [routerLink]="['/producto', producto.id]">
    <div class="relative w-full h-full rounded-xl md:rounded-[1.5rem] overflow-hidden transform-gpu">
      
      <div class="absolute inset-0 bg-neutral-100 dark:bg-neutral-800 animate-pulse rounded-xl md:rounded-[1.5rem]"></div>
      
      <img 
        [src]="mainImage" 
        [alt]="displayName"
        (error)="onImageError($event)"
        class="absolute inset-0 w-full h-full object-cover transition-all duration-700 ease-[cubic-bezier(0.25,1,0.5,1)]"
        [class.opacity-100]="!isHovered"
        [class.opacity-0]="isHovered"
        [class.scale-110]="isHovered"
        [class.scale-100]="!isHovered"
      />
      
      <img 
        [src]="backImage" 
        [alt]="displayName + ' Reverse'"
        (error)="onImageError($event)"
        class="absolute inset-0 w-full h-full object-cover transition-all duration-700 ease-[cubic-bezier(0.25,1,0.5,1)]"
        [class.scale-105]="isHovered"
        [class.opacity-100]="isHovered"
        [class.scale-100]="!isHovered"
        [class.opacity-0]="!isHovered"
      />

      <div *ngIf="producto.badge && badgeConfig" 
           class="absolute top-2 left-2 md:top-4 md:left-4 z-10 flex items-center px-1.5 py-0.5 md:px-3 md:py-1.5 rounded-full text-[7px] sm:text-[8px] md:text-[10px] leading-none font-black tracking-widest uppercase backdrop-blur-md border"
           [ngClass]="[badgeConfig.bg, badgeConfig.text, badgeConfig.border]">
        <app-icono [nombre]="badgeConfig.icon" [size]="10" className="mr-1 md:w-3 md:h-3 md:mr-1.5"></app-icono>
        <span>{{producto.badge}}</span>
      </div>

      <div *ngIf="hasDiscount" 
           class="absolute left-2 md:left-4 z-10 flex items-center px-2 py-1 md:px-3 md:py-1.5 rounded-full text-[9px] sm:text-[10px] md:text-[11px] leading-none font-black tracking-widest uppercase backdrop-blur-md border bg-rose-500/90 text-white border-rose-500 shadow-lg shadow-rose-500/30"
           [ngClass]="producto.badge ? 'top-8 md:top-14' : 'top-2 md:top-4'">
        <app-icono nombre="tag" [size]="10" className="mr-1 md:w-3 md:h-3 md:mr-1.5"></app-icono>
        <span>-{{producto.discountPercentage}}%</span>
      </div>

      <button 
        (click)="toggleFavorite($event)"
        class="absolute top-1.5 right-1.5 md:top-4 md:right-4 z-10 p-1.5 md:p-3 rounded-full bg-neutral-50 dark:bg-neutral-950/40 backdrop-blur-md border border-white/10 text-neutral-900 dark:text-white hover:bg-white dark:bg-neutral-900 transition-all duration-300 active:scale-90 group/btn"
      >
        <app-icono 
          nombre="heart" 
          [size]="12" 
          className="transition-all duration-500 ease-out md:w-[18px] md:h-[18px]"
          [ngClass]="{
            'fill-rose-500 text-rose-500 scale-110 shadow-rose-500 drop-shadow-[0_0_8px_rgba(244,63,94,0.8)]': isFavorite,
            'fill-transparent text-neutral-900 dark:text-white group-hover/btn:scale-110': !isFavorite
          }"
        ></app-icono>
      </button>

    </div>
  </div>

  <div class="p-3 md:p-5 flex flex-col flex-grow gap-2 md:gap-3">
    <div class="flex flex-col md:flex-row justify-between items-start gap-2 md:gap-4">
      <div class="flex-1 w-full cursor-pointer" [routerLink]="['/producto', producto.id]">
        <p class="text-[9px] md:text-[11px] font-bold tracking-widest text-neutral-500 uppercase mb-1 md:mb-1.5 flex items-center gap-1.5 md:gap-2">
          {{producto.brand}} <span class="w-1 h-1 rounded-full bg-neutral-300 dark:bg-neutral-700"></span> {{producto.year}}
        </p>
        <h3 class="text-[13px] md:text-lg font-bold text-neutral-900 dark:text-white leading-tight group-hover:text-amber-400 transition-colors">{{displayName}}</h3>
        
        <!-- Talles -->
        <div class="mt-3 flex flex-wrap gap-1 md:gap-2">
          <button *ngFor="let size of tallesGenerales" 
                  (click)="selectSize(size, $event)"
                  [title]="getVariantStock(size) === 0 ? 'No hay stock en este momento' : ''"
                  class="w-6 h-6 md:w-8 md:h-8 flex items-center justify-center rounded-lg border text-[9px] md:text-xs font-bold transition-all relative overflow-hidden"
                  [ngClass]="{
                    'bg-amber-500 dark:bg-amber-500 border-amber-500 dark:border-amber-500 text-neutral-950 dark:text-neutral-950 shadow-lg shadow-amber-500/30 dark:shadow-amber-500/20 hover:scale-110': selectedSize === size && getVariantStock(size) > 0,
                    'bg-neutral-100 dark:bg-neutral-800 border-neutral-200 dark:border-neutral-700 text-neutral-600 dark:text-neutral-400 hover:text-neutral-900 dark:hover:text-white hover:bg-neutral-200 dark:hover:bg-neutral-700 hover:scale-110': selectedSize !== size && getVariantStock(size) > 0,
                    'bg-neutral-50 dark:bg-neutral-900/20 border-neutral-100 dark:border-neutral-800/50 text-neutral-300 dark:text-neutral-700 opacity-60': getVariantStock(size) === 0
                  }">
            <span [class.line-through]="getVariantStock(size) === 0" [class.opacity-50]="getVariantStock(size) === 0">{{size}}</span>
            <!-- Diagonal line strike-through for out of stock -->
            <div *ngIf="getVariantStock(size) === 0" class="absolute inset-0 w-full h-full">
              <div class="w-[140%] h-[1px] bg-neutral-300 dark:bg-neutral-700 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 -rotate-45"></div>
            </div>
          </button>
        </div>
      </div>
    </div>
    
    <div class="mt-auto flex items-end justify-between pt-3 border-t border-neutral-200 dark:border-neutral-800 gap-1 md:gap-2">
      <div class="flex flex-col items-start gap-0.5 min-w-0">
        <!-- Maintain height always by making it invisible if no discount -->
        <div class="text-[9px] md:text-[11px] text-neutral-400 dark:text-neutral-500 line-through font-bold px-1" [class.invisible]="!hasDiscount">
          {{ producto.price * 1000 | currency:'ARS':'symbol-narrow':'1.0-0':'es-AR' }}
        </div>
        <div class="bg-neutral-100 dark:bg-neutral-800/80 backdrop-blur-sm border px-1.5 py-0.5 md:px-3 md:py-1.5 rounded-md md:rounded-xl"
             [ngClass]="hasDiscount ? 'border-rose-200 dark:border-rose-500/30 bg-rose-50 dark:bg-rose-500/10' : 'border-neutral-300 dark:border-neutral-700/50'">
          <span class="text-[11px] sm:text-xs md:text-base font-black tracking-tighter sm:tracking-normal" [ngClass]="hasDiscount ? 'text-rose-600 dark:text-rose-400' : 'text-neutral-900 dark:text-white'">
            {{ finalPrice * 1000 | currency:'ARS':'symbol-narrow':'1.0-0':'es-AR' }}
          </span>
        </div>
      </div>
      
      <div class="flex gap-1 md:gap-2 flex-shrink-0">
        <!-- Hide eye on mobile to save horizontal space, since card is clickable -->
        <button class="hidden md:flex p-2 rounded-xl bg-neutral-100 dark:bg-neutral-800 text-neutral-600 dark:text-neutral-400 hover:text-amber-500 hover:bg-white dark:hover:bg-neutral-700 transition-all border border-neutral-200 dark:border-neutral-700" title="Ver detalle" [routerLink]="['/producto', producto.id]">
          <app-icono nombre="eye" [size]="18"></app-icono>
        </button>
        <button 
          (click)="agregarAlCarrito($event)"
          class="p-1.5 md:p-2 rounded-lg md:rounded-xl bg-amber-500 text-neutral-950 hover:bg-amber-400 hover:scale-105 transition-all font-bold shadow-lg shadow-amber-500/20 relative" 
          title="Agregar al carrito"
        >
          <app-icono 
            nombre="shopping-cart" 
            [size]="18"
            [ngClass]="{'animate-bounce': isAdding}"
          ></app-icono>
          
          <span *ngIf="cantidadEnCarrito > 0" class="absolute -top-2 -right-2 bg-rose-600 text-white text-[11px] font-black min-w-[20px] h-[20px] px-1 flex items-center justify-center rounded-full border-2 border-white shadow-sm leading-none">
            {{ cantidadEnCarrito }}
          </span>
        </button>
      </div>
    </div>
  </div>
</div>
